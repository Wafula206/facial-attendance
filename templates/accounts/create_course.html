{% extends 'base.html' %}
{% block title %}Create Course{% endblock %}
{% block content %}
<div class="form-container">
    <h1>Create New Course</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group"><label>Course Code *</label><input type="text" name="code" placeholder="e.g., CSC401" required></div>
        <div class="form-group"><label>Course Name *</label><input type="text" name="name" placeholder="e.g., Artificial Intelligence" required></div>
        <div class="form-group"><label>Credits</label><input type="number" name="credits" value="3"></div>
        <div class="form-group"><label>Programme</label><select name="programme">{% for p in programmes %}<option value="{{ p.id }}">{{ p.code }} - {{ p.name }}</option>{% endfor %}</select></div>
        <div class="form-row"><div class="form-group"><label>Year</label><select name="year"><option>1</option><option>2</option><option>3</option><option>4</option></select></div><div class="form-group"><label>Semester</label><select name="semester"><option>1</option><option>2</option></select></div></div>
        <div class="form-group"><label>Lecturer</label><select name="lecturer"><option value="">-- None --</option>{% for l in lecturers %}<option value="{{ l.id }}">{{ l.user.get_full_name|default:l.user.username }} ({{ l.staff_id }})</option>{% endfor %}</select></div>
        <button type="submit" class="btn btn-primary">Create Course</button>
        <a href="/admin-dashboard/courses/" class="btn">Cancel</a>
    </form>
</div>
<style>.form-container{max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:16px}.form-group{margin-bottom:20px}.form-group label{display:block;margin-bottom:8px;font-weight:500}.form-group input,.form-group select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px}.form-row{display:flex;gap:15px}.form-row .form-group{flex:1}.btn{padding:12px 24px;border-radius:8px;text-decoration:none;display:inline-block;margin-right:10px;border:none;cursor:pointer}.btn-primary{background:#667eea;color:white}@media(max-width:768px){.form-row{flex-direction:column;gap:0}}</style>
{% endblock %}
