{% extends 'base.html' %}
{% block title %}Create User{% endblock %}
{% block content %}
<div class="container">
    <div class="form-container">
        <h1>Create New User</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="form-row"><div class="form-group"><label>First Name</label><input type="text" name="first_name"></div><div class="form-group"><label>Last Name</label><input type="text" name="last_name"></div></div>
            <div class="form-group"><label>Username *</label><input type="text" name="username" required></div>
            <div class="form-group"><label>Email *</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Registration/Staff ID *</label><input type="text" name="reg_no" required></div>
            <div class="form-group"><label>Password *</label><input type="password" name="password" required></div>
            <div class="form-group"><label>User Type *</label><select name="user_type" id="userType" required><option value="student">Student</option><option value="lecturer">Lecturer</option></select></div>
            <div id="studentFields"><div class="form-group"><label>Programme</label><select name="programme">{% for p in programmes %}<option value="{{ p.id }}">{{ p.code }} - {{ p.name }}</option>{% endfor %}</select></div><div class="form-row"><div class="form-group"><label>Current Year</label><select name="current_year"><option>1</option><option>2</option><option>3</option><option>4</option></select></div><div class="form-group"><label>Current Semester</label><select name="current_semester"><option>1</option><option>2</option></select></div></div></div>
            <div id="lecturerFields" style="display:none;"><div class="form-group"><label>Department</label><input type="text" name="department"></div><div class="form-group"><label>Qualification</label><input type="text" name="qualification"></div></div>
            <button type="submit" class="btn btn-primary">Create User</button>
            <a href="/admin-dashboard/users/" class="btn">Cancel</a>
        </form>
    </div>
</div>
<script>document.getElementById('userType').addEventListener('change',function(){document.getElementById('studentFields').style.display=this.value=='student'?'block':'none';document.getElementById('lecturerFields').style.display=this.value=='lecturer'?'block':'none';});</script>
<style>.form-container{max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:16px}.form-group{margin-bottom:20px}.form-group label{display:block;margin-bottom:8px;font-weight:500}.form-group input,.form-group select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px}.form-row{display:flex;gap:15px;margin-bottom:20px}.form-row .form-group{flex:1}.btn{padding:12px 24px;border-radius:8px;text-decoration:none;display:inline-block;margin-right:10px}@media(max-width:768px){.form-row{flex-direction:column;gap:0}}</style>
{% endblock %}
