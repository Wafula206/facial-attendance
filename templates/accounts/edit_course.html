{% extends 'base.html' %}
{% block title %}Edit Course{% endblock %}
{% block content %}
<div class="form-container">
    <h1>Edit Course: {{ course.code }}</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group"><label>Course Code *</label><input type="text" name="code" value="{{ course.code }}" required></div>
        <div class="form-group"><label>Course Name *</label><input type="text" name="name" value="{{ course.name }}" required></div>
        <div class="form-group"><label>Credits</label><input type="number" name="credits" value="{{ course.credits }}"></div>
        <div class="form-row"><div class="form-group"><label>Year</label><select name="year"><option {% if course.year == 1 %}selected{% endif %}>1</option><option {% if course.year == 2 %}selected{% endif %}>2</option><option {% if course.year == 3 %}selected{% endif %}>3</option><option {% if course.year == 4 %}selected{% endif %}>4</option></select></div><div class="form-group"><label>Semester</label><select name="semester"><option {% if course.semester == 1 %}selected{% endif %}>1</option><option {% if course.semester == 2 %}selected{% endif %}>2</option></select></div></div>
        <div class="form-group"><label>Lecturer</label><select name="lecturer"><option value="">-- None --</option>{% for l in lecturers %}<option value="{{ l.id }}" {% if course.lecturer and course.lecturer.id == l.id %}selected{% endif %}>{{ l.user.get_full_name|default:l.user.username }} ({{ l.staff_id }})</option>{% endfor %}</select></div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/admin-dashboard/courses/" class="btn">Cancel</a>
    </form>
</div>
<style>.form-container{max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:16px}.form-group{margin-bottom:20px}.form-group label{display:block;margin-bottom:8px;font-weight:500}.form-group input,.form-group select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px}.form-row{display:flex;gap:15px}.form-row .form-group{flex:1}.btn{padding:12px 24px;border-radius:8px;text-decoration:none;display:inline-block;margin-right:10px;border:none;cursor:pointer}.btn-primary{background:#667eea;color:white}@media(max-width:768px){.form-row{flex-direction:column;gap:0}}</style>
{% endblock %}
