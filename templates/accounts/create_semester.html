{% extends 'base.html' %}
{% block title %}Create Semester{% endblock %}
{% block content %}
<div class="form-container">
    <h1>Create New Semester</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group"><label>Semester Name *</label><input type="text" name="name" placeholder="e.g., Fall 2024, Spring 2025" required></div>
        <div class="form-group"><label>Start Date *</label><input type="date" name="start_date" required></div>
        <div class="form-group"><label>End Date *</label><input type="date" name="end_date" required></div>
        <div class="form-group"><label><input type="checkbox" name="is_active"> Activate this semester (will deactivate others)</label></div>
        <button type="submit" class="btn btn-primary">Create Semester</button>
        <a href="/admin-dashboard/semesters/" class="btn">Cancel</a>
    </form>
</div>
<style>.form-container{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:16px}.form-group{margin-bottom:20px}.form-group label{display:block;margin-bottom:8px;font-weight:500}.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px}.btn{padding:12px 24px;border-radius:8px;text-decoration:none;display:inline-block;margin-right:10px;border:none;cursor:pointer}.btn-primary{background:#667eea;color:white}</style>
{% endblock %}
