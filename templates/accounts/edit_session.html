{% extends 'base.html' %}
{% block title %}Edit Session{% endblock %}
{% block content %}
<div class="form-container">
    <h1>Edit Session</h1>
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Course Code</label>
            <input type="text" name="course_code" value="{{ session.course_code }}" required>
        </div>
        
        <div class="form-group">
            <label>Course Name</label>
            <input type="text" name="course_name" value="{{ session.course_name }}" required>
        </div>
        
        <div class="form-group">
            <label>Topic / Title</label>
            <input type="text" name="topic" value="{{ session.topic|default:'' }}" placeholder="e.g., Week 1: Introduction to Computing">
        </div>
        
        <div class="form-group">
            <label>Venue</label>
            <input type="text" name="venue" value="{{ session.venue|default:'' }}">
        </div>
        
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="scheduled" {% if session.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
                <option value="ongoing" {% if session.status == 'ongoing' %}selected{% endif %}>Ongoing</option>
                <option value="completed" {% if session.status == 'completed' %}selected{% endif %}>Completed</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/admin-dashboard/sessions/" class="btn">Cancel</a>
    </form>
</div>
<style>
    .form-container{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:16px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;margin-bottom:8px;font-weight:500}
    .form-group input,.form-group select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px}
    .btn{padding:12px 24px;border-radius:8px;text-decoration:none;display:inline-block;margin-right:10px;border:none;cursor:pointer}
    .btn-primary{background:#667eea;color:white}
</style>
{% endblock %}
