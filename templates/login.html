<!DOCTYPE html>
<html>
<head>
    <title>Login | Attendance System | Karatina University</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-card h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .login-card .subtitle {
            color: #667eea;
            margin-bottom: 30px;
        }
        .login-card .status {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .login-form .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-form button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .login-form button:hover {
            transform: translateY(-2px);
        }
        .credentials {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 12px;
            text-align: left;
        }
        .credentials p {
            margin: 5px 0;
            color: #666;
        }
        .credentials strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🎓 Face Recognition</h1>
            <h1>Attendance System</h1>
            <div class="subtitle">Karatina University</div>
            <div class="status">✅ System Ready</div>
            
            <form method="post" action="/login/" class="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            
            <div class="credentials">
                <strong>📋 Test Credentials:</strong>
                <p>👑 Admin: <strong>admin</strong> / Admin@2024</p>
                <p>👨‍🏫 Lecturer: <strong>lecturer</strong> / Lecturer@123</p>
                <p>👨‍🎓 Student: <strong>CS/001/22</strong> / Student@123</p>
            </div>
            
            <div style="margin-top: 20px; font-size: 11px; color: #999;">
                Karatina University - Final Year Project<br>
                Brian Wekesa Wafula | Dr. Thomas Njoroge
            </div>
        </div>
    </div>
</body>
</html>
