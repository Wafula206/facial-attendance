services:
  - type: web
    name: attendance-system
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd backend
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:\
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: ALLOWED_HOSTS
        value: .onrender.com

databases:
  - name: attendance-db
    plan: free
    databaseName: attendance_db
    user: attendance_user
